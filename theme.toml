# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemes#themetoml for an example

name = "spork-archie"
license = "MIT"
licenselink = "https://github.com/athul/archie/blob/master/LICENSE"
description = "Archie is a minimal and clean theme for hugo with a markdown-ish UI. This fork aims to reduce the visual noise e.g. from the aggressive link formatting and provide gentler default colors."
homepage = "https://github.com/athul/archie"
tags = ["blog","simple","responsive","minimal","tags","personal","clean","shortcodes"]
features = ["blog", "Clean and minimal", "Responsive", "Syntax highlighting",]
min_version = "0.41"

[author]
  name = "John Sperger, Athul Cyriac Ajay"
  homepage = "https://github.com/jsperger/spork-archie, https://github.com/athul"
